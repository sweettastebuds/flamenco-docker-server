# This file was written on 2026-03-01 01:08:39 +00:00 by Flamenco 3.8.2

_meta:
  version: 3
manager_name: Flamenco
database: flamenco-manager.sqlite
database_check_period: 10m0s
listen: :8080
autodiscoverable: true
local_manager_storage_path: ./flamenco-manager-storage
shared_storage_path: ""
shaman:
  enabled: true
  garbageCollect:
    period: 24h0m0s
    maxAge: 744h0m0s
task_timeout: 10m0s
worker_timeout: 1m0s
blocklist_threshold: 3
task_fail_after_softfail_count: 3
mqtt:
  client:
    enabled: false
    broker: ""
    clientID: flamenco
    topic_prefix: flamenco
    username: ""
    password: ""
variables:
  blender:
    values:
      - audience: all
        platform: linux
        value: blender
      - audience: all
        platform: windows
        value: blender.exe
      - audience: all
        platform: darwin
        value: blender
  blenderArgs:
    values:
      - audience: all
        platform: all
        value: -b -y
